# kit.conf — per-deployment branding.
# This is the ONLY file that differs between the AXE and IMI kits; all logic is
# shared. Tenancy (which shared pool you land in) is derived server-side from
# your key identity, not from this file.
BRAND="IMI"
CLI_NAME="imi-memory"
ENV_FILE="$HOME/.imi-memory.env"
MARKER="imi-memory"
